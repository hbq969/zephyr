advice:
  log:
    enabled: true
  restful-limit:
    enabled: true

tabula:
  enabled: false
  create-table: false

operlog:
  enabled: false
  policy: embedded
  table-name: log_hbq969
  use-default-collect-policy: true
  thread-num: 1
  queue-capacity: 5000
  batch-size: 50
  batch-timeout-mills: 5000

zephyr:
  chat:
    max-history-messages: 200  # 单次对话最多携带的历史消息条数，超出截断
    upload:
      max-file-size: 209715200  # 200MB
      directory-name: .zephyr-uploads
    tool-output:
      max-length: 8000  # tool 结果最大字符数，超出截断
      binary-sample-size: 4096  # 二进制检测采样字符数
      binary-threshold: 0.3  # 二进制判定阈值（控制字符占比），0.0~1.0
      binary-extraction-limit: 6000  # 二进制内容提取可读片段最大字符数
    context:
      token-estimation-ratio: 0.3  # token 估算系数（字符数 × 系数）
      skill-token-threshold: 1000  # tool 内容超过此 token 数判定为 skill 而非 memory
    session-idle-timeout-seconds: 1800  # 会话空闲超时（秒），30 分钟无活动自动取消
    session-scan-interval-seconds: 60  # 会话超时扫描间隔（秒）
  llm:
    client:
      connect-timeout-seconds: 30  # LLM API 连接超时
      read-timeout-seconds: 300  # LLM API 读取超时，5 分钟，覆盖长时间工具执行后的慢响应
  mcp:
    tool:
      timeout-seconds: 60  # MCP 工具调用超时（秒），超时后强制终止进程
    connection:
      max-connections: 100  # MCP 连接池最大连接数
      idle-timeout-millis: 900000  # 空闲连接超时（毫秒），默认 15 分钟
      cleanup-interval-millis: 300000  # 空闲连接清理间隔（毫秒），默认 5 分钟
  model-config:
    api:
      connect-timeout-seconds: 5  # 模型 API 探测连接超时
      read-timeout-seconds: 5  # 模型 API 探测读取超时
  skills:
    home: ${user.home}/.zephyr/skills  # skill 安装目录
  memory:
    home: ${user.home}/.zephyr/memory  # 记忆存储目录
  knowledge:
    top-k: 5  # 知识库检索默认返回结果数量，LLM 可通过 top_k 参数覆盖
    data-dir: ${user.home}/.zephyr/knowledge
    chroma:
      mode: embedded
      bin-path: chroma  # chroma 可执行文件路径，默认 "chroma" 走系统 PATH，可配置为 venv/bin/chroma 绝对路径
      data-dir: ${user.home}/.zephyr/chroma
      port: 18951
    lightrag:
      enabled: false
      base-url: http://localhost:9621
      connect-timeout-seconds: 10
      read-timeout-seconds: 300
  skill:
    upload:
      max-size-bytes: 104857600  # 100MB
    sync:
      claude-skills-path: ${user.home}/.claude/skills
      codex-skills-path: ${user.home}/.codex/skills
      opencode-skills-path: ${user.home}/.opencode/skills
  encrypt:
    restful:
      aes:
        key: ${encrypt.restful.aes.key}  # 引用原有配置
        iv: ${encrypt.restful.aes.iv}
  shell:
    mode: whitelist  # disabled | whitelist | allowAll，默认 whitelist
    # whitelist 模式下允许执行的命令（仅命令名，不含参数），默认值如下：
    allowed-commands:
      # 解释器
      - python3
      - python
      - node
      - ruby
      - perl
      - php
      - lua
      - deno
      - bun
      # 包管理
      - npm
      - npx
      - yarn
      - pnpm
      - pip
      - pip3
      - gem
      - composer
      - cargo
      - go
      # 版本控制
      - git
      - hg
      # 编译构建
      - javac
      - java
      - mvn
      - gradle
      - make
      - cmake
      - gcc
      - g++
      - clang
      - clang++
      - rustc
      - dotnet
      # 文件操作（不含 rm/rmdir，防止误删）
      - ls
      - cat
      - head
      - tail
      - wc
      - find
      - grep
      - egrep
      - awk
      - sed
      - mkdir
      - touch
      - cp
      - mv
      - ln
      - stat
      - file
      - du
      - df
      - tree
      - realpath
      - basename
      - dirname
      # 文本处理
      - sort
      - uniq
      - cut
      - tr
      - tee
      - diff
      - patch
      - echo
      - printf
      - xargs
      - envsubst
      - column
      - jq
      - yq
      - iconv
      - strings
      - od
      - hexdump
      - xxd
      # 压缩归档
      - tar
      - gzip
      - gunzip
      - zip
      - unzip
      - bzip2
      - bunzip2
      - xz
      - unxz
      - zstd
      - unzstd
      # 网络（仅安全工具）
      - curl
      # 系统信息
      - date
      - env
      - which
      - whoami
      - uname
      - hostname
      - uptime
      - free
      - vmstat
      - iostat
      - ulimit
    max-background-processes: 5  # 每用户最大后台进程数
    max-background-lifetime-seconds: 3600  # 后台进程最大存活时间（秒）
    cleanup-interval-seconds: 60  # 后台进程超时扫描间隔（秒）
    command-timeout-seconds: 120  # 同步命令超时（秒）
    max-output-bytes: 1048576  # 前台命令输出最大读取字节数（1MB）
  workspace:
    browse-root: .zephyr/workspace  # browse 接口默认根目录，相对于 user.home

management:
  endpoint:
    refresh:
      enabled: true
  endpoints:
    enabled-by-default: false
    jmx:
      exposure:
        exclude: "*"
    web:
      base-path: "/dn3i1vx4"
      exposure:
        include: "refresh"