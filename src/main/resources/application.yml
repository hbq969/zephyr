  queue-capacity: 5000
  batch-size: 50
  batch-timeout-mills: 5000

management:
  endpoint:
    refresh:
      enabled: true
  endpoints:
    enabled-by-default: false
    jmx:
      exposure:
        exclude: "*"
    web:
      base-path: "/dn3i1vx4"
      exposure:
        include: "refresh"