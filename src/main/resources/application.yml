      iv: 8AE506C91AFB4AAC
    rsa:
      charset: utf-8
      show-log: true
      public-key: MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQCe7L2gjYAmFCW8Q8S5kW7F064t/np+sP84PKLRsuZho3TZIjryGSyq8reNTm2Zrz0pKzddR0Rh6wUzP9xSAsQXH0uC6J5/WbmFhFW0k8zgkXSKktirs2BDuObEYZwJLng41yhP694H9sVBVhyqzy90Qx/dJWWa2vXHp2I+jlLELQIDAQAB
      private-key: 
    advice-packages:
      - com.github.hbq969.code
